; php.ini for ic81dump — PHP 8.1.34 NTS x86 VS16
extension_dir = "ext"

zend_extension = ioncube_loader_win_8.1.dll
extension      = php_opcodedump.dll

; suppress output noise
error_reporting  = E_ALL & ~E_NOTICE & ~E_DEPRECATED
display_errors   = Off
log_errors       = Off

; enough memory for large encoded files
memory_limit = 256M
